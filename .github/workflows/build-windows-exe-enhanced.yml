name: Build Windows EXE Enhanced

on:
  workflow_dispatch:
  push:
    paths:
      - 'auto_key_gui_enhanced.py'
      - 'requirements_enhanced.txt'
      - '.github/workflows/build-windows-exe-enhanced.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_enhanced.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name auto_key_gui_enhanced auto_key_gui_enhanced.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto_key_gui_enhanced_windows
          path: dist/auto_key_gui_enhanced.exe
